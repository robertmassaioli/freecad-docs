name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# OIDC-based deployment — no PAT or branch-push needed.
# `pages: write` + `id-token: write` replace the legacy `contents: write`.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress runs are not cancelled
# so a queued deploy always completes after the current one finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          key: mkdocs-${{ hashFiles('requirements.txt') }}
          path: ~/.cache/pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build documentation (strict)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # ── 2. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest

    # Wires the job to the github-pages environment so the deployment URL and
    # status appear in the repository's Environments panel.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
